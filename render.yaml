services:
  - type: web
    name: mbro-bot
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: CLAUDE_API_KEY
        sync: false
      - key: EVOLUTION_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        value: mbro-bot
